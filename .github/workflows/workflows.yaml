name: Auto-Scaling-Instance-Deployment-Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. AWS 자격 증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 2. S3에 설정 파일 업로드
    - name: Upload Config and Assets to S3
      run: |
        aws s3 cp ./docker-compose.yaml s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.yaml
        aws s3 cp ./docker/default.conf s3://${{ secrets.S3_BUCKET_NAME }}/default.conf
        aws s3 sync ./html s3://${{ secrets.S3_BUCKET_NAME }}/html --delete

    # 3. Amazon ECR 로그인
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Docker 이미지 빌드 및 ECR 푸시
    - name: Build, tag, and push docker image to ECR repository
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build --no-cache -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG -f docker/Dockerfile .
        docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG

    # 5. AWS SSM을 사용하여 EC2에 배포
    - name: Deploy to EC2 using SSM
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:${{ secrets.ASG_TAG_KEY }},Values=${{ secrets.ASG_TAG_VALUE }}" \
          --comment "Deploying Nginx via Docker Compose" \
          --parameters 'commands=[
            "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
            "mkdir -p /home/ec2-user/nginx/html /home/ec2-user/nginx/conf.d /home/ec2-user/nginx/logs",
            "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.yaml /home/ec2-user/docker-compose.yaml",
            "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/default.conf /home/ec2-user/nginx/conf.d/default.conf",
            "aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html /home/ec2-user/nginx/html --delete",
            "sudo chown -R ec2-user:ec2-user /home/ec2-user/nginx",
            "cd /home/ec2-user",
            "docker compose pull",
            "docker compose up -d --remove-orphans",
            "docker image prune -f"
          ]' \
          --region ${{ secrets.AWS_REGION }}